<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Média</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="card">
        <h1>Simulador de média semestral</h1>

        <form id="formNotas">

            <div class="campo">
                <label for="a1">Atividade 1</label>
                <input type="number" id="a1" step="0.1" min="0" max="10" required>
            </div>

            <div class="campo">
                <label for="p1">Prova 1</label>
                <input type="number" id="p1" step="0.1" min="0" max="10" required>
            </div>

            <div class="campo">
                <label for="pi">Prova Integrada</label>
                <input type="number" id="pi" step="0.1" min="0" max="10" required>
            </div>

            <div class="campo">
                <label for="a2">Atividade 2</label>
                <input type="number" id="a2" step="0.1" min="0" max="10" required>
            </div>

            <div class="campo">
                <label for="p2">Prova 2</label>
                <input type="number" id="p2" step="0.1" min="0" max="10" required>
            </div>

            <div class="botoes">
                <button type="submit">Calcular</button>
                <button type="button" id="limpar">Limpar</button>
            </div>

        </form>

        <section id="resultado"></section>
    </main>

    <footer>
        Desenvolvido por Maria Luiza Figueiredo Correa-
        2026
    </footer>

    <script src="script.js"></script>

</body>

</html>
